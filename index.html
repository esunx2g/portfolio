<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Portfolio | Eunsung Lee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body class="antialiased">
    <nav class="fixed top-0 z-50 w-full border-b border-gray-100 bg-white/80 backdrop-blur-md">
        <div class="mx-auto max-w-5xl px-4 py-3 sm:px-6 sm:py-4">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between sm:gap-4">
                <div class="flex items-center gap-2">
                    <span class="text-sm font-bold tracking-[0.18em] text-black uppercase sm:text-lg sm:tracking-[0.2em]">Portfolio</span>
                </div>
                <div class="overflow-x-auto [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden sm:flex-1">
                    <div class="flex min-w-max justify-start gap-5 pr-4 text-[11px] font-bold uppercase tracking-widest text-gray-500 sm:justify-end sm:gap-6 sm:pr-0">
                        <a href="#about" class="hover:text-black transition">About</a>
                        <a href="#publications" class="hover:text-black transition">Publications</a>
                        <a href="#projects" class="hover:text-black transition">Projects</a>
                        <a href="#study" class="hover:text-black transition">Study</a>
                        <a href="#contact" class="hover:text-black transition text-black">Contact</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="mx-auto max-w-5xl px-6 pt-32 pb-24">
        <div id="about-slot"></div>
        <div id="publications-slot"></div>
        <div id="projects-slot"></div>
        <div id="study-slot"></div>
        <div id="contact-slot"></div>
    </main>

    <footer class="bg-white border-t border-gray-100 py-12 px-6">
        <div class="mx-auto max-w-5xl flex justify-between items-center text-[10px] font-bold uppercase tracking-[0.3em] text-gray-300">
            <p>&copy; 2026 Eunsung Lee</p>
            <p>Research Portfolio</p>
        </div>
    </footer>

    <script src="assets/app.js"></script>
</body>
</html>
